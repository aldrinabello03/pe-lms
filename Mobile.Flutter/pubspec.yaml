name: pelms
description: Physical Education Learning Management System - Mobile App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0

  # HTTP client
  dio: ^5.4.1

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Video player
  video_player: ^2.8.2

  # UI helpers
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.1

  # Excel export
  excel: ^4.0.2

  # Path for file operations
  path_provider: ^2.1.2

  # Share / open files
  open_filex: ^4.3.4

  # JSON serialization
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
